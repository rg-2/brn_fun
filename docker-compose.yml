# Paper-mode live traders — Phase 1, no orders placed.
#
# Architecture: one service (and container) per (pair, strategy). Each has
# its own state file and log file; the SQLite database is shared because
# bar data is inherently pair-partitioned by the `instrument` column.
#
# Usage on the dev server:
#   docker compose up -d                # start every registered strategy
#   docker compose up -d paper-audusd   # start just one
#   docker compose logs -f paper-audusd # stream one strategy's events
#   docker compose stop paper-audusd    # graceful shutdown (SIGTERM)
#   docker compose ps                   # all services + their status
#
# Adding a new (pair, strategy) means:
#   1. Register the strategy in src/brn_fun/strategy.py
#   2. Add a new service block below following the paper-audusd pattern
#      with matching --log-file / --state-file paths
#   3. `docker compose up -d`
#
# On first startup each service's cold-start fetches the last ~6 days of
# that pair's M1 bars from Oanda into data/brn_fun.sqlite; subsequent
# polls fetch only the delta since the newest stored bar.

services:
  paper-audusd:
    build:
      context: .
      # Match the host UID so the mounted data dir isn't owned by root.
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: brn_fun/paper:latest
    container_name: brn_paper_audusd

    # Persist state + log per-strategy; share the SQLite DB.
    volumes:
      - ./data:/app/data
      # Read-only bind mounts — credentials + config live outside the image.
      - ./.env:/app/.env:ro
      - ./config.yaml:/app/config.yaml:ro

    # Explicit per-strategy paths so future strategies don't collide.
    command:
      - brn
      - live
      - watch
      - audusd
      - --log-file
      - /app/data/paper_audusd.log
      - --state-file
      - /app/data/paper_audusd_state.json

    # Auto-restart on crash but stop when the operator explicitly stops it.
    restart: unless-stopped

    # Docker delivers SIGTERM on stop; the paper trader's request_stop()
    # handler flushes state and closes the log within a few seconds.
    stop_signal: SIGTERM
    stop_grace_period: 15s

  # -----------------------------------------------------------------
  # Add more strategies here as new services following the same pattern.
  # Example (uncomment + register in strategy.py when ready):
  #
  # paper-usdcad:
  #   build: { context: ., args: { UID: ${UID:-1000}, GID: ${GID:-1000} } }
  #   image: brn_fun/paper:latest
  #   container_name: brn_paper_usdcad

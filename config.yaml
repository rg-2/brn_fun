# brn_fun configuration
#
# Currency pairs to track. Use Oanda's underscore-separated instrument names
# (e.g. EUR_USD, GBP_JPY). See:
# https://developer.oanda.com/rest-live-v20/instrument-ep/
instruments:
  - EUR_USD
  - GBP_USD
  - USD_JPY
  - AUD_USD
  - USD_CAD
  - EUR_JPY
  - GBP_JPY

# Default candle granularity. M1 = 1-minute bars. We use M1 as the primary
# analytical granularity because it eliminates path-ambiguity in backtests
# (a single-bar's price range rarely contains both target and stop).
# M15 remains available; override with --granularity M15 and rescale
# bar-count parameters by 1/15 (see CLI --help).
default_granularity: M1

# Local SQLite database path (relative to project root or absolute).
db_path: data/brn_fun.sqlite

# Oanda price component to store. "M" = midpoint, "B" = bid, "A" = ask.
# Mid is enough for backtesting; add bid/ask later if we care about spread.
price: M
